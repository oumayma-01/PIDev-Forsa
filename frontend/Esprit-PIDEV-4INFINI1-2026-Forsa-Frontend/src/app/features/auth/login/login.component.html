<div class="auth-page forsa-gradient-bg">
  <div class="auth-card-wrap">
    <div class="auth-brand">
      <app-forsa-logo [height]="56" />
      <h1>Forsa</h1>
      <p class="text-muted">The future of fintech is here.</p>
    </div>

    <div class="forsa-auth-card auth-shell">
      <app-forsa-card [noBorder]="true" [shadow]="'none'">
        <div class="card-pad">
          <header class="card-head">
            <h2>Welcome back</h2>
            <p class="text-muted">Enter your credentials to access your account</p>
          </header>

          <form id="login-form" class="auth-stack login-form" (ngSubmit)="submit()">
            <div>
              <label class="forsa-label" for="login-user">Username</label>
              <input
                id="login-user"
                forsaInput
                name="username"
                [(ngModel)]="username"
                autocomplete="username"
                placeholder="Your username"
                class="input-h-12"
                required
              />
            </div>
            <div>
              <label class="forsa-label" for="login-password">Password</label>
              <input
                id="login-password"
                forsaInput
                type="password"
                name="password"
                [(ngModel)]="password"
                autocomplete="current-password"
                placeholder="Enter your password"
                class="input-h-12"
                required
              />
              <div class="forgot-password-row">
                <a routerLink="/forgot-password" class="link-sm forgot-password-link">Forgot password?</a>
              </div>
            </div>
            <div class="auth-error" role="alert" [hidden]="!error()">{{ error() }}</div>
          </form>
          <div class="card-foot login-card-foot">
            <app-forsa-button
              type="submit"
              formId="login-form"
              [disabled]="busy()"
              [widthFull]="true"
              size="lg"
            >
              {{ busy() ? 'Signing in…' : 'Sign In' }}
              <app-forsa-icon name="arrow-right" [size]="20" />
            </app-forsa-button>
            <p class="muted-center">
              Don't have an account?
              <a routerLink="/register" class="link-bold">Sign up</a>
            </p>
          </div>
        </div>
      </app-forsa-card>
    </div>

    <div class="auth-foot">
      <app-forsa-icon name="shield" [size]="16" />
      Secured by Forsa
    </div>
  </div>
</div>
