<div class="page-head">
  <div>
    <h2>{{ isEdit() ? 'Edit Claim' : 'Submit Claim' }}</h2>
    <p>{{ isEdit() ? 'Update existing claim details.' : 'File a new insurance claim.' }}</p>
  </div>
  <a routerLink="/dashboard/insurance/claims">
    <app-forsa-button variant="outline">Back</app-forsa-button>
  </a>
</div>

@if (loading()) {
  <div class="state-box"><app-forsa-icon name="history" [size]="32" class="spin" /></div>
} @else {
  <app-forsa-card>
    <form class="form-body" (ngSubmit)="submit()" #f="ngForm">
      @if (error()) {
        <div class="form-alert"><app-forsa-icon name="alert-circle" [size]="16" />{{ error() }}</div>
      }

      <div class="form-row">
        <div class="form-group">
          <label for="claimNumber">Claim Number *</label>
          <input id="claimNumber" type="text" [(ngModel)]="form.claimNumber" name="claimNumber" required />
        </div>
        <div class="form-group">
          <label for="policyId">Related Policy *</label>
          <select id="policyId" [(ngModel)]="policyId" name="policyId" required>
             <option [value]="0" disabled>— Select Policy —</option>
             @for (p of policies(); track p.id) {
               <option [value]="p.id">{{ p.policyNumber ?? p.insuranceProduct?.productName ?? ('Policy ' + p.id) }}</option>
             }
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="incidentDate">Incident Date *</label>
          <input id="incidentDate" type="date" [ngModel]="form.incidentDate | date:'yyyy-MM-dd'" (ngModelChange)="form.incidentDate = $event" name="incidentDate" required />
        </div>
        <div class="form-group">
          <label for="claimAmount">Claim Amount (TND) *</label>
          <input id="claimAmount" type="number" [(ngModel)]="form.claimAmount" name="claimAmount" required min="0" step="0.01" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="approvedAmount">Approved Amount (TND)</label>
          <input id="approvedAmount" type="number" [(ngModel)]="form.approvedAmount" name="approvedAmount" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label for="indemnificationPaid">Indemnification Paid (TND)</label>
          <input id="indemnificationPaid" type="number" [(ngModel)]="form.indemnificationPaid" name="indemnificationPaid" min="0" step="0.01" />
        </div>
      </div>

      <div class="form-group">
        <label for="status">Claim Status *</label>
        <select id="status" [(ngModel)]="form.status" name="status" required>
          @for (s of claimStatuses; track s) {
            <option [value]="s">{{ s }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" [(ngModel)]="form.description" name="description" rows="3"></textarea>
      </div>

      <div class="form-footer">
        <a routerLink="/dashboard/insurance/claims"><app-forsa-button type="button" variant="ghost">Cancel</app-forsa-button></a>
        <app-forsa-button type="submit" [disabled]="saving() || !!f.invalid">
          @if (saving()) { <app-forsa-icon name="history" [size]="16" class="spin" /> }
          {{ saving() ? 'Saving…' : (isEdit() ? 'Update Claim' : 'Submit Claim') }}
        </app-forsa-button>
      </div>
    </form>
  </app-forsa-card>
}
