# Profil optionnel : exposer l'API derrière ngrok (HTTPS public).
# Démarrage :
#   mvn spring-boot:run -Dspring-boot.run.profiles=ngrok
# ou : java -jar app.jar --spring.profiles.active=ngrok
# Puis dans un autre terminal : ngrok http 8089
#
# Base URL Angular (environment.mobile.ts) :
#   https://<sous-domaine>.ngrok-free.app/forsaPidev/api

server.address=0.0.0.0
server.forward-headers-strategy=framework
